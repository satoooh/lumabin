name: Desktop E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'

permissions:
  contents: read

concurrency:
  group: desktop-e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E (macOS)
    runs-on: macos-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run e2e:install

      - name: Run E2E tests
        run: npm run e2e

      - name: Run dense fixture E2E tests
        run: npm run e2e:dense

      - name: Verify dense metrics snapshots
        run: npm run verify:dev-metrics-snapshot

      - name: Upload dense metrics snapshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-e2e-metrics-${{ github.run_id }}
          path: apps/desktop/test-results/**/dev-metrics-snapshot.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload E2E artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-e2e-artifacts-${{ github.run_id }}
          path: |
            apps/desktop/test-results
            apps/desktop/playwright-report
          if-no-files-found: ignore
          retention-days: 14
