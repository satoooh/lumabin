name: Repository Hygiene

on:
  pull_request:
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/repository-hygiene.yml'
      - 'apps/desktop/scripts/audit-public-readiness.mjs'
      - 'apps/desktop/tests/ui/public-readiness-audit.smoke.test.tsx'
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - 'SUPPORT.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/repository-hygiene.yml'
      - 'apps/desktop/scripts/audit-public-readiness.mjs'
      - 'apps/desktop/tests/ui/public-readiness-audit.smoke.test.tsx'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: Public readiness audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit public readiness
        run: npm run audit:public-history
