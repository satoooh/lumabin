version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/desktop
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: build
      prefix-development: build
      include: scope
    groups:
      desktop-runtime-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      desktop-development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "@electron/fuses"
        update-types:
          - version-update:semver-major
      - dependency-name: "@vitejs/plugin-react"
        update-types:
          - version-update:semver-major
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      - dependency-name: vite
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci(deps)
